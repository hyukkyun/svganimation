name: 'Build Desktop Apps (Tauri)'

on:
  workflow_dispatch: # GitHub에서 원할 때만 수동으로 [Run workflow] 버튼을 눌러서 실행하도록 설정 (빌드 시간 절약)

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest] # 맥(Mac)과 윈도우(Windows) 가상환경 두 곳에서 동시에 실행

    runs-on: ${{ matrix.platform }}
    
    # Release 배포 권한 설정
    permissions:
      contents: write
      
    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Rust 설치 (Tauri 데스크탑 빌드용)
        uses: dtolnay/rust-toolchain@stable

      - name: 4. 프로젝트 패키지 설치 (npm)
        run: npm install

      - name: 4.5. Fix macOS corrupted icns file
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o src-tauri/icons/icon.icns
          rm -R icon.iconset

      - name: 5. Tauri 로 자동 빌드 후 파일(dmg, msi) 추출
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.${{ github.run_number }}
          releaseName: 'Desktop Build v1.0.${{ github.run_number }}'
          releaseBody: 'GitHub Actions를 통해 자동 생성된 Mac 및 Windows 설치 파일입니다.'
          releaseDraft: true # 초안(Draft) 상태로 Release 탭에 업로드됨
          prerelease: false
